kind = "web"
previewPath = "/"
title = "PilotStaff"
version = "1.0.0"
id = "artifacts/pilotstaff"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18317

[services.development]
run = "pnpm --filter @workspace/pilotstaff run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pilotstaff", "run", "build" ]
publicDir = "artifacts/pilotstaff/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18317"
BASE_PATH = "/"
